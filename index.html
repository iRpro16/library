<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
    <title>Library</title>
</head>
<body> 
    <div class="container">
    <header class="header">
        <button onclick="displayModal()" class="add-book">+</button>

    </header>

    <main class="main-container">
        
        <div class="card-container"></div>

    </main>

    </div>

    <div class="modal-container">
        <form action="#" id="modal" class="modal">
            <button onclick="closeModal()" class="close">x</button>
            <div class="input-container">
            <input type="text" id="author" placeholder="Author" required>
            <input type="text" id="title" placeholder="Title" required>
            <input type="text" id="pages" placeholder="Pages" required>
            <input type="text" id="read" placeholder="Read">
            </div>
            <button type="submit" onclick="addBookToLibrary()" class="add">Add</button>
        </form>
        </div>
    

</body>
</html>
