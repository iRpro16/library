<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
    <title>Library</title>
</head>
<body>

    <div class="container">

    <div class="header">

        <button onclick="displayModal()" id="myBtn">Add Book</button>


    </div>

    <div class="display-container"> 

        <div class="card-container"></div>
 
        <dialog class="modal">
            <button onclick="closeModal()" class="close">x</button>
            <form class="form" method="dialog">
            <input type="text" id="author" placeholder="Author" required>
            <input type="text" id="title" placeholder="Title" required>
            <input type="text" id="pages" placeholder="Pages" required>
            <input type="text" id="read" placeholder="Read">
            <button onclick="addBookToLibrary()" id="submit">Submit</button>
        </form>
        </dialog>
       
    </div>

</div>

    
</body>
</html>
