<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
    <title>Library</title>
</head>
<body> 
    <div class="container">
    <header class="header">
        <button onclick="displayModal()" class="add-book"><p>Add Book +</p></button>
        <h1>The Library.</h1>
        <div class="log-in"><p>Log in</p></div>

    </header>

    <main class="main-container">
        
        <div class="card-container"></div>

    </main>

    </div>

    <div class="modal-container">
        <form action="#" id="modal" class="modal">
            <div class="close-modal">
               <button onclick="closeModal()" class="close">x</button>
            </div>
            <div class="input-container">
            <input type="text" id="author" class="input" placeholder="Author"required>
            <input type="text" id="title" class="input" placeholder="Title" required>
            <input type="text" id="pages" class="input" placeholder="Pages" required>
            <input type="checkbox" id="read">
            </div>
            <div class="add-library"> 
               <button type="submit" onclick="addBookToLibrary()" class="add">Add</button>
            </div>
        </form>
        </div>
    

</body>
</html>
